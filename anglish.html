<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
	<title>Anglish | dairycultist.dev</title>
	<style>
		body { margin: 0; width: 100%; background-color: #ddc39c; color: #641111; font-family: Arial, Helvetica, sans-serif; }
		fieldset { border: 1px solid #333339; padding: 1em; margin-top: 2em; }
		legend { font-weight: 700; }
		input[type="text"] { background: #f6e8c6; font: inherit; color: inherit; width: 100%; box-sizing: border-box; padding: 0.5em 1em; border-radius: 100px; border: 2px solid #ddc39c; }
		h2 { border-bottom: 1px solid #641111; font-weight: 400; padding-bottom: 0.2em; }
		main { background: #f0dfbc; padding: 1em; margin: 0 auto; width: 800px; min-height: 100vh; box-sizing: border-box; }
		sub { font-size: 0.6em; padding-left: 0.1em; }
		.entry { background: #f6e8c6; padding: 0.5em 1em; margin: 0.5em 0; box-sizing: border-box; border-radius: 0.5em; border: 2px solid #ddc39c; }
	</style>
	<script>

		// words that are unchanged: iron, gold, coal, stick, wood, sheep, fire (both noun and verb), chicken (animal), cow, pig, word
		// duckling (A baby duck.)
		// gosling (A baby goose.)

		const dictionary = [
			{ "anglish": "wordblind", "cat": "Adj", ipa: "", "translations": [ "dyslexic" ], "notes": "" },
			{ "anglish": "wordblindness", "cat": "N", ipa: "", "translations": [ "dyslexia" ], "notes": "" },
			{ "anglish": "hewblind", "cat": "Adj", ipa: "", "translations": [ "colorblind" ], "notes": "" },
			{ "anglish": "hewblindness", "cat": "N", ipa: "", "translations": [ "colorblindness" ], "notes": "" },
			{ "anglish": "hew", "cat": "N", ipa: "", "translations": [ "color" ], "notes": "" },
			{ "anglish": "bewitching", "cat": "Adj", ipa: "", "translations": [ "fascinating" ], "notes": "" },
			{ "anglish": "wild", "cat": "N", ipa: "waɪ̯ld", "translations": [ "forest" ], "notes": "" },
			{ "anglish": "ward", "cat": "N", ipa: "", "translations": [ "guard", "warden" ], "notes": "" },
			{ "anglish": "ward", "cat": "V", ipa: "", "translations": [ "guard", "protect" ], "notes": "" },
			{ "anglish": "folkward", "cat": "N", ipa: "", "translations": [ "police" ], "notes": "" },
			{ "anglish": "lowerd", "cat": "N", ipa: "", "translations": [ "hell" ], "notes": "Even though 'hell' is Germanic, 'lowerd' sounds cooler." },
			{ "anglish": "middlerd", "cat": "N", ipa: "", "translations": [ "Earth" ], "notes": "Even though 'earth' is Germanic, 'middlerd' sounds cooler (and has Germanic precedent, see <a href='https://en.wiktionary.org/wiki/myddelerd'>myddelerd</a>)." },
			{ "anglish": "higherd", "cat": "N", ipa: "", "translations": [ "heaven" ], "notes": "Even though 'heaven' is Germanic, 'higherd' sounds cooler." },
			{ "anglish": "erd", "cat": "N", ipa: "ɝd", "translations": [ "nature", "wilderness", "earth", "ground", "soil", "~natural", "~naturally" ], "notes": "To say 'the <strong>natural</strong> hotspring,' you would say 'the hotspring <strong>of erd</strong>.' To say 'mice are <strong>naturally</strong> skittish,' you would say 'mice are <strong>of a skittish erd</strong>.'" },
			{ "anglish": "farspeaker", "cat": "N", ipa: "", "translations": [ "telephone" ], "notes": "" },
			{ "anglish": "wordbook", "cat": "N", ipa: "", "translations": [ "dictionary" ], "notes": "" },
			{ "anglish": "inlandish", "cat": "Adj", ipa: "", "translations": [ "native", "indigenous" ], "notes": "Opposite of outlandish." },
			{ "anglish": "fathom", "cat": "V", ipa: "", "translations": [ "imagine", "believe" ], "notes": "" },
			{ "anglish": "mint", "cat": "N", ipa: "", "translations": [ "coin" ], "notes": "" },
			{ "anglish": "foregoer", "cat": "N", ipa: "", "translations": [ "predecessor" ], "notes": "" },
			{ "anglish": "hindsight", "cat": "N", ipa: "", "translations": [ "retrospect" ], "notes": "" },
			{ "anglish": "meld", "cat": "V", ipa: "", "translations": [ "fuse", "combine" ], "notes": "" },
			{ "anglish": "melding", "cat": "N", ipa: "", "translations": [ "fusion", "combination", "alloy" ], "notes": "" },
			{ "anglish": "frith", "cat": "N", ipa: "", "translations": [ "peace", "~peacefully" ], "notes": "To say 'they <strong>peacefully</strong> discussed it,' you would say 'they discussed it <strong>in frith</strong>.'" },
			{ "anglish": "outlandish", "cat": "Adj", ipa: "", "translations": [ "foreign", "alien" ], "notes": "Opposite of inlandish." },
			{ "anglish": "baren", "cat": "N", ipa: "", "translations": [ "male person", "man" ], "notes": "" },
			{ "anglish": "maiden", "cat": "N", ipa: "ˈmeɪ̯dən", "translations": [ "female person", "woman" ], "notes": "" },
			{ "anglish": "man", "cat": "N", ipa: "ˈbɛɹən", "translations": [ "human", "person" ], "notes": "Of any gender." },
			{ "anglish": "warding", "cat": "N", ipa: "", "translations": [ "wall" ], "notes": "" },
			{ "anglish": "cowhide", "cat": "N", ipa: "", "translations": [ "leather" ], "notes": "Even though 'leather' is Germanic, 'cowhide' sounds cooler." },
			{ "anglish": "lash", "cat": "N", ipa: "", "translations": [ "meat", "flesh" ], "notes": "From Old English <a href='https://en.wiktionary.org/wiki/fl%C3%A6sc#Old_English'>flæsc</a>." },
			{ "anglish": "cowlash", "cat": "N", ipa: "", "translations": [ "beef", "cow meat" ], "notes": "See lash." },
			{ "anglish": "piglash", "cat": "N", ipa: "", "translations": [ "pork", "pig meat" ], "notes": "" },
			{ "anglish": "chickenlash", "cat": "N", ipa: "", "translations": [ "chicken (meat)" ], "notes": "" },
			{ "anglish": "checkling", "cat": "N", ipa: "", "translations": [ "chick" ], "notes": "A baby chicken." },
			{ "anglish": "seethe", "cat": "V", ipa: "", "translations": [ "cook" ], "notes": "" },
			{ "anglish": "bake", "cat": "V", ipa: "", "translations": [ "bake", "roast" ], "notes": "To cook in an enclosure, such as an oven." },
			{ "anglish": "oven", "cat": "N", ipa: "", "translations": [ "oven", "furnace" ], "notes": "" },
			{ "anglish": "by word", "cat": "PrepP", ipa: "", "translations": [ "~verbal", "~verbally" ], "notes": "Ex. 'The <strong>verbal</strong> announcement' => 'The announcement <strong>by word</strong>'; 'They <strong>verbally</strong> agreed' => 'They agreed <strong>by word</strong>.'" },
			{ "anglish": "skiemight", "cat": "N", ipa: "[ˈskiːmaɪ̯t]", "translations": [ "electricity", "lightning" ], "notes": "Literally 'sky power.' From Middle English pronunciation of <a href='https://en.wiktionary.org/wiki/sky#Middle_English'>sky</a>." },
			{ "anglish": "horsemight", "cat": "N", ipa: "", "translations": [ "horsepower" ], "notes": "" },
			{ "anglish": "might", "cat": "N", ipa: "", "translations": [ "strength", "power" ], "notes": "" },
			{ "anglish": "mein", "cat": "N", ipa: "", "translations": [ "magic" ], "notes": "From Middle English <a href='https://en.wiktionary.org/wiki/mayn'>mayn</a>." },

		].sort((a, b) => a.anglish.localeCompare(b.anglish));

		function search() {

			const searchTerm = document.getElementById("search").value.trim().toLowerCase();
			const area = document.getElementById("lexicon-area");

			area.innerHTML = "";

			for (let entry of dictionary) {

				if (!(entry.translations.join() + " " + entry.anglish).toLowerCase().includes(searchTerm))
					continue;

				let ipa = "";

				if (entry.ipa.length != 0)
					ipa = `<p><strong>Pronunciation:</strong> [${ entry.ipa }]</p>`;

				let translations = "";

				for (let trans of entry.translations) {
					translations += trans + ", ";
				}
				translations = translations.substring(0, Math.max(0, translations.length - 2));

				area.innerHTML += `<div class="entry"><h2><strong>${ entry.anglish }</strong><sub>${ entry.cat }</sub></h2>${ ipa }<p><strong>Translations:</strong> ${ translations }</p><p>${ entry.notes }</p></div>`;
			}
		}
	</script>
</head>
<body onload="search()">
	<main>
		<p>This is my version of <a href="https://anglish.org/wiki/Anglish">Anglish</a> which foregoes a <i>little</i> historical accuracy to sound better and vibier, and also with an actually usable dictionary that recognizes homographs and provides pronunciations.</p>

		<input type="text" id="search" placeholder="Search an English/Anglish word here" onkeydown="if (event.key === 'Enter') search()">

		<button type="button" onclick="search()" style="background: #641111; border-radius: 100px; font-weight: 700; color: #f0dfbc; border: 0; padding: 0.4em 0.8em; float: right; transform: translate(-0.5em, -2.4em);">Search</button>

		<div id="lexicon-area"></div>
	</main>
</body>
</html>

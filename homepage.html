<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
	<title>dairycultist.dev</title>
	<style>
		body { width: 600px; margin: auto; padding: 1em; background-color: #0e1111; color: #dddde5; font-family: Arial, Helvetica, sans-serif; }
		fieldset { border: 1px solid #333339; padding: 1em; margin-top: 2em; }
		legend { font-weight: 700; }
		input[type="text"] { background: transparent; font: inherit; color: inherit; border: 1px solid #333339; padding: 2px 4px; }
	</style>
</head>
<body>
	<h1>I'm Dairycultist</h1>
	<p>I like Minecraft clones, medieval fantasy, boomer shooters, and drawings of inordinately fat women (anime/furry/pony).</p>

	<p>Do I blog? No. Am I active on forums? No. But do I have any finished projects for you to see? Also no.</p>

	<fieldset>
		<legend>Guestbook</legend>
		<form action="/guestbook" method="POST" enctype="text/plain">

			<label for="signature">Signature:</label>
			<input type="text" id="signature" name="signature" placeholder="anonymous"><br><br>

			<label for="message">Message:</label>
			<input type="text" id="message" name="message" style="width: 26em;"><br><br>

			<input type="submit" value="Submit">
		</form>
		<br>
		<div>[[[guestbookContent]]]</div>
	</fieldset>
</body>
</html>
